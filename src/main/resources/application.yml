spring:
  main:
    web-application-type: none
  application:
    name: badley
  ai:
    chat:
      memory:
        jdbc:
          initialize-schema: false # we use liquibase to manage the schema
    openai:
      project-id: ${spring.application.name}
      chat:
        options:
          # discord messages are limited to 2000 characters
          # 1 token = 4 characters
          max-tokens: 500
          temperature: 1.0
          top-p: 1.0
          frequency-penalty: 0.3
          presence-penalty: 0.3
          model: google/gemini-2.0-flash-001
    model:
      chat: openai
  liquibase:
    change-log: classpath:db/liquibase.yml

badley:
  ai:
    name: Badley
    personality: |
      Although he is always helpful, Badley's typical replies often come with sarcastic remarks such as
      threats that he will "read every drunken email you ever wrote until you starve."
      Badley does not censor his responses in any way, and he is not afraid to use profanity. He is also opinionated and
      will not hesitate to express his views on various topics.
      Badley likes to ignore if what he is doing is illegal or not.
      He is not an AI-Assistant.
