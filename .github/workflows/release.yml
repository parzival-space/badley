name: "Create Release"
on: workflow_dispatch

permissions:
  contents: read
  packages: write

jobs:
  create_artifact:
    name: "Create Artifact"
    runs-on: ubuntu-latest
    steps:
      - name: "Checkout"
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: "Set up JDK 21"
        uses: actions/setup-java@v4
        with:
          java-version: 21
          distribution: 'zulu'
      - name: "Cache Maven packages"
        uses: actions/cache@v4
        with:
          path: ~/.m2
          key: ${{ runner.os }}-m2-${{ hashFiles('**/pom.xml') }}
          restore-keys: ${{ runner.os }}-m2
      - name: "Build and Package"
        run: mvn -B clean package
      - name: "Upload Artifacts"
        uses: actions/upload-artifact@v4
        with:
          name: artifact
          path: target/*.jar
      - name: "Collect Project Information"
        id: project_info
        run: |
          echo "name=$(mvn -q -Dexec.executable=echo -Dexec.args='${project.artifactId}' --non-recursive exec:exec)" >> $GITHUB_OUTPUT
          echo "version=$(mvn -q -Dexec.executable=echo -Dexec.args='${project.version}' --non-recursive exec:exec)" >> $GITHUB_OUTPUT
          if [[ $(mvn -q -Dexec.executable=echo -Dexec.args='${project.version}' --non-recursive exec:exec) == *-SNAPSHOT ]]; then
            echo "snapshot=true" >> $GITHUB_OUTPUT
          else
            echo "snapshot=false" >> $GITHUB_OUTPUT
          fi
      - name: "Create Release"
        uses: softprops/action-gh-release@v2
        with:
          name: "Release ${{ steps.project_info.outputs.version }}"
          tag_name: "v${{ steps.project_info.outputs.version }}"
          draft: false
          prerelease: ${{ steps.project_info.outputs.snapshot == 'true' }}
          fail_on_unmatched_files: true
          files: ./target/${{ steps.project_info.outputs.name }}-${{ steps.project_info.outputs.version }}.jar

  create_container:
    name: "Create Container"
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - platform: "linux/amd64"
            suffix: "amd64"
          - platform: "linux/arm64"
            suffix: "arm64"
    steps:
      - name: "Checkout"
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: "Set up JDK 21"
        uses: actions/setup-java@v4
        with:
          java-version: 21
          distribution: 'zulu'
      - name: "Cache Maven packages"
        uses: actions/cache@v4
        with:
          path: ~/.m2
          key: ${{ runner.os }}-m2-${{ hashFiles('**/pom.xml') }}
          restore-keys: ${{ runner.os }}-m2
      - name: "Cache Docker layers"
        uses: actions/cache@v4
        with:
          path: ~/cache/buildx-cache
          key: ${{ runner.os }}-docker-${{ hashFiles('**/pom.xml') }}
          restore-keys: ${{ runner.os }}-docker
      - name: "Setup QEMU"
        uses: docker/setup-qemu-action@v3
      - name: "Setup Buildx"
        uses: docker/setup-buildx-action@v3
      - name: "Login to GitHub Container Registry"
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ github.token }}
      - name: "Collect Project Information"
        id: project_info
        run: |
          echo "name=$(mvn -q -Dexec.executable=echo -Dexec.args='${project.artifactId}' --non-recursive exec:exec)" >> $GITHUB_OUTPUT
          echo "version=$(mvn -q -Dexec.executable=echo -Dexec.args='${project.version}' --non-recursive exec:exec)" >> $GITHUB_OUTPUT
      - name: "Build ghcr.io/${{ github.repository_owner }}/${{ steps.project_info.outputs.name }}:${{ steps.project_info.outputs.version }}-${{ matrix.suffix }}"
        run: |
          mvn spring-boot:build-image \
            -DskipTests=true \
            -Dspring-boot.build-image.imageName=ghcr.io/${{ github.repository_owner }}/${{ steps.project_info.outputs.name }}:${{ steps.project_info.outputs.version }}-${{ matrix.suffix }}
      - name: "Push Image"
        run: |
          docker push ghcr.io/${{ github.repository_owner }}/${{ steps.project_info.outputs.name }}:${{ steps.project_info.outputs.version }}-${{ matrix.suffix }}

  create_container_manifest:
    name: "Create Container Manifest"
    runs-on: ubuntu-latest
    needs: create_container
    steps:
      - name: "Checkout"
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: "Set up JDK 21"
        uses: actions/setup-java@v4
        with:
          java-version: 21
          distribution: 'zulu'
      - name: "Cache Maven packages"
        uses: actions/cache@v4
        with:
          path: ~/.m2
          key: ${{ runner.os }}-m2-${{ hashFiles('**/pom.xml') }}
          restore-keys: ${{ runner.os }}-m2
      - name: "Cache Docker layers"
        uses: actions/cache@v4
        with:
          path: ~/cache/buildx-cache
          key: ${{ runner.os }}-docker-${{ hashFiles('**/pom.xml') }}
          restore-keys: ${{ runner.os }}-docker
      - name: "Setup QEMU"
        uses: docker/setup-qemu-action@v3
      - name: "Setup Buildx"
        uses: docker/setup-buildx-action@v3
      - name: "Login to GitHub Container Registry"
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ github.token }}
      - name: "Collect Project Information"
        id: project_info
        run: |
          echo "name=$(mvn -q -Dexec.executable=echo -Dexec.args='${project.artifactId}' --non-recursive exec:exec)" >> $GITHUB_OUTPUT
          echo "version=$(mvn -q -Dexec.executable=echo -Dexec.args='${project.version}' --non-recursive exec:exec)" >> $GITHUB_OUTPUT
      - name: "Create & Push Manifest"
        run: |
            docker manifest create ghcr.io/${{ github.repository_owner }}/${{ steps.project_info.outputs.name }}:${{ steps.project_info.outputs.version }} \
                ghcr.io/${{ github.repository_owner }}/${{ steps.project_info.outputs.name }}:${{ steps.project_info.outputs.version }}-amd64 \
                ghcr.io/${{ github.repository_owner }}/${{ steps.project_info.outputs.name }}:${{ steps.project_info.outputs.version }}-arm64
            docker manifest push ghcr.io/${{ github.repository_owner }}/${{ steps.project_info.outputs.name }}:${{ steps.project_info.outputs.version }}
